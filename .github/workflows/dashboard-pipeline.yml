name: WebportSystem.Dashboard CI/CD

on:
  workflow_dispatch:

jobs:
  build_image:
    name: Package Software
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write    
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
      
      - name: Build and Push Docker Image 
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/webportsystem-dashboard
          TAG=$(echo $GITHUB_SHA | cut -c1-7)
          
          docker compose -f docker-compose.yml build webportsystem.dashboard
          docker tag $IMAGE_NAME:latest $IMAGE_NAME:$TAG

          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$TAG
          
  deploy_image:
    name: Deploy to Portainer
    runs-on: ubuntu-latest
    needs: build_image   
    steps:
      - name: Trigger Portainer Webhook
        run: |
          curl -X POST "https://portainer.webport.co.za/api/webhooks/da2ee11e-8f87-4ae4-9a94-aebe17ad663f"               
