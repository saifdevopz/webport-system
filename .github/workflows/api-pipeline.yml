  update_server:
    name: Deploy to Server
    runs-on: ubuntu-latest
    #needs: build_image

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e

            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u saifdevopz --password-stdin
            echo "🚀 Deploying IMAGE_TAG=$IMAGE_TAG"            
             
            cd /home/webport-system
            docker stack deploy \
              --with-registry-auth \
              -c docker-stack.yaml \
              webport-api
